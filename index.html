<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Brigada 33</title>
<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0f0f0f;
    color:white;
}

.header{
    background:black;
    height:250px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    font-weight:bold;
}

.gallery{
    padding:40px;
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(350px,1fr));
    gap:30px;
}

.gallery img{
    width:100%;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.video-section{
    padding:40px;
    text-align:center;
}

video{
    width:80%;
    max-width:900px;
    border-radius:20px;
}
</style>
</head>

<body>

<div class="header">
Brigada 33
</div>

<div class="gallery">
<img src="foto1.png" alt="Brigada 33 Sahne 1">
<img src="foto2.png" alt="Brigada 33 Sahne 2">
</div>

<div class="video-section">
<video controls>
<source src="video.mp4" type="video/mp4">
</video>
</div>

</body>
</html>
