<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brigada 33</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial, Helvetica, sans-serif;
background:#050505;
color:white;
overflow-x:hidden;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:radial-gradient(circle at center,#111 0%,#000 70%);
}

.hero h1{
font-size:90px;
letter-spacing:6px;
color:#ff2a2a;
text-shadow:0 0 25px rgba(255,0,0,0.6);
}

.hero p{
margin-top:20px;
color:#888;
font-size:18px;
}

.scroll{
margin-top:40px;
font-size:14px;
color:#aaa;
animation:float 2s infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(8px)}
100%{transform:translateY(0)}
}

/* VIDEO */
.video-section{
padding:120px 20px;
text-align:center;
background:#080808;
}

.video-section iframe{
width:90%;
max-width:1000px;
height:520px;
border:none;
border-radius:16px;
box-shadow:0 20px 60px rgba(0,0,0,0.9);
}

/* GALLERY */
.gallery{
max-width:1400px;
margin:auto;
padding:120px 40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.card{
position:relative;
overflow:hidden;
border-radius:14px;
cursor:pointer;
}

.card img{
width:100%;
display:block;
transition:transform 0.6s;
}

.card:hover img{
transform:scale(1.1);
}

.card::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(transparent,rgba(0,0,0,0.8));
opacity:0;
transition:0.4s;
}

.card:hover::after{
opacity:1;
}

/* FOOTER */
footer{
text-align:center;
padding:60px 20px;
color:#666;
border-top:1px solid #111;
}

</style>
</head>

<body>

<section class="hero">
<h1>BRIGADA 33</h1>
<p>Official Video & Scene Gallery</p>
<div class="scroll">SCROLL</div>
</section>

<section class="video-section">
<iframe src="https://www.youtube.com/embed/c65CHwQ9VlA" allowfullscreen></iframe>
</section>

<section class="gallery">

<div class="card">
<img src="foto1.png">
</div>

<div class="card">
<img src="foto2.png">
</div>

<div class="card">
<img src="foto3.png">
</div>

<div class="card">
<img src="foto4.png">
</div>

<div class="card">
<img src="foto5.png">
</div>

</section>

<footer>
Brigada 33 © 2026
</footer>

</body>
</html>
