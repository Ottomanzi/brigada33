<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brigada 33</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0a0a0a;
color:white;
}

header{
position:sticky;
top:0;
background:#000;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
}

.logo{
font-size:26px;
font-weight:bold;
letter-spacing:2px;
color:#ff2a2a;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
opacity:0.8;
}

nav a:hover{opacity:1}

.hero{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:64px;
margin:0;
letter-spacing:4px;
}

.hero p{
color:#aaa;
margin-top:10px;
}

.video-section{
padding:60px 20px;
text-align:center;
}

.video-section iframe{
width:90%;
max-width:1000px;
height:500px;
border:none;
border-radius:16px;
}

.gallery{
max-width:1400px;
margin:auto;
padding:60px 40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
}

.card{
background:#111;
border-radius:14px;
overflow:hidden;
transition:0.35s;
cursor:pointer;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 10px 30px rgba(0,0,0,0.8);
}

.card img{
width:100%;
display:block;
}

.card-title{
padding:16px;
font-size:14px;
color:#ccc;
}

footer{
text-align:center;
padding:40px;
color:#666;
border-top:1px solid #222;
}

</style>
</head>

<body>

<header>
<div class="logo">Brigada 33</div>
<nav>
<a href="#">Home</a>
<a href="#">Video</a>
<a href="#">Gallery</a>
</nav>
</header>

<section class="hero">
<h1>Brigada 33</h1>
<p>Official Video & Gallery</p>
</section>

<section class="video-section">
<iframe src="https://www.youtube.com/embed/c65CHwQ9VlA" allowfullscreen></iframe>
</section>

<section class="gallery">

<div class="card">
<img src="foto1.png">
<div class="card-title">Brigada Scene 1</div>
</div>

<div class="card">
<img src="foto2.png">
<div class="card-title">Brigada Scene 2</div>
</div>

<div class="card">
<img src="foto3.png">
<div class="card-title">Brigada Scene 3</div>
</div>

<div class="card">
<img src="foto4.png">
<div class="card-title">Brigada Scene 4</div>
</div>

<div class="card">
<img src="foto5.png">
<div class="card-title">Brigada Scene 5</div>
</div>

</section>

<footer>
Brigada 33 © 2026
</footer>

</body>
</html>
