<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Oyun Mağazası</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
}

header{
background:#222;
color:white;
padding:15px;
text-align:center;
}

.container{
display:grid;
grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

button{
background:black;
color:white;
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
width:100%;
}

button:hover </style>

</head>

<body>

<header>
<h1>Oyun Dijital Mağaza</h1>
</header>

<div class="container">

<div class="card">
<h2>Oyun Paketi 1</h2>
<p>Bilgi paketi açıklaması</p>
<h3>₺50</h3>
<button>Satın Al</button>
</div>

<div class="card">
<h2>Oyun Paketi 2</h2>
<p>Bilgi paketi açıklaması</p>
<h3>₺100</h3>
<button>Satın Al</button>
</div>

</div>

</body>
</html>
