<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Brigada 33</title>
<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0f0f0f;
    color:white;
}

.header{
    background:black;
    height:250px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    font-weight:bold;
}

.video-section{
    padding:40px;
    text-align:center;
}

.video-section iframe{
    width:80%;
    max-width:900px;
    height:400px;
    border-radius:20px;
}

.gallery{
    padding:40px;
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
}

.gallery img{
    width:400px;
    max-width:90%;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div class="header">
Brigada 33
</div>

<div class="video-section">
<iframe src="https://www.youtube.com/embed/c65CHwQ9VlA" allowfullscreen></iframe>
</div>

<div class="gallery">
<img src="foto1.png" alt="Brigada 33 Foto 1">
<img src="foto2.png" alt="Brigada 33 Foto 2">
</div>

</body>
</html>
